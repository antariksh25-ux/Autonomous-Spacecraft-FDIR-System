# Nginx reverse proxy for FDIR backend (REST + WebSocket)
#
# Assumes:
# - Backend listens on 127.0.0.1:8001
# - TLS is handled by certbot (recommended)

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name api.YOUR_DOMAIN;

  # certbot will manage redirect + TLS block if you run:
  #   sudo certbot --nginx -d api.YOUR_DOMAIN

  location / {
    proxy_pass http://127.0.0.1:8001;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Helpful defaults
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
  }
}
